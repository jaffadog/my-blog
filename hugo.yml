baseURL: "https://jaffadog.github.io/my-blog/"
title: Voyaging with Calypso
paginate: 5
theme: PaperMod

params:
  title: My Blog Title 2
  description: "Description of my blog"
  keywords: [Blog, Portfolio, PaperMod]
  author: Jeremy
  defaultTheme: dark
  ShowShareButtons: true
  # ShareButtons: ["linkedin", "twitter"] # To customize which share buttons to be enabled on page  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  showCategories: true
  showTags: true
  showReadingTime: false
  comments: true

  cover:
    hidden: true # hide everywhere but not in structured data
    hiddenInList: false # hide on list pages and home
    # hiddenInSingle: true # hide on single page

menu:
  main:
    - name: Archive
      url: /archives/
      weight: 5
    - name: Search
      url: /search/
      weight: 10    

markup:
  goldmark:
    renderer:
      unsafe: true

outputs:
  home:
    - HTML
    - RSS
    - JSON
